<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofta - Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=IM+Fell+English:ital@0;1&family=Josefin+Sans:wght@100;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- this is the grain-->
    <div class="grain" aria-hidden="true"></div>

    <!-- header  -->
    <header>
      <div class="header-body">
        <!-- Left: vertical rule + season label -->
        <div class="header-side">
          <div class="vr"></div>
          <span class="season-label">Spring Collection</span>
        </div>

        <!-- Centre: logo block -->
        <div class="header-centre">
          <p class="pre-logo">Est. — The House of</p>
          <h1 class="logo">LOFTA</h1>
          <div class="logo-underline"></div>
          <p class="sub-logo">Curated Store · Selected Objects</p>
        </div>

        

      <!-- Bottom rule pair -->
      <div class="header-rules">
        <div class="rule rule--thick"></div>
        <div class="rule rule--thin"></div>
      </div>
    </header>

    <!-- section label -->
    <div class="section-label" aria-hidden="true">
      <span class="section-num">No. 001 — 005</span>
      <span class="section-title">Featured Products</span>
      <span class="section-num">Store</span>
    </div>

    <!-- main dashboard -->
    <main>
      <div id="product-container"></div>
    </main>

    <!-- footer at the bottom-->
    <footer>
      <div class="footer-rules">
        <div class="rule rule--thin"></div>
        <div class="rule rule--thick"></div>
      </div>
      <div class="footer-body">
        <span class="footer-brand">LOFTA</span>
        <span class="footer-sep">——</span>
        <span class="footer-copy">Handcrafted with care · All rights reserved</span>
        <span class="footer-sep">——</span>
        <span class="footer-brand">◈</span>
      </div>
      <div class="torii-bar torii-bar--footer"></div>
    </footer>

    <script src="cp_2.js"></script>
  </body>
</html>
